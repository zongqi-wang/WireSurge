<!doctype html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WireSurge</title>
  <style type="text/css">
    body { margin: 0; font-family: system-ui, sans-serif; background: #f7f8fa; color: #17202a; line-height: 1.55; }
    .site-main { max-width: 960px; margin: 0 auto; padding: 56px 24px; }
    h1 { font-size: clamp(2.4rem, 7vw, 5rem); line-height: 1; margin: 0 0 18px; }
    p { max-width: 720px; font-size: 1.08rem; }
    .tenets { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 28px; }
    .tenets div { background: #fff; border: 1px solid #d8dee6; border-radius: 8px; padding: 16px; }
  </style>
</head>
<body>
  <div class="site-main">
    <h1>WireSurge</h1>
    <p>A local-first programmable traffic workbench for APIs, DNS, protocol workflows, and controlled load experiments.</p>
    <div class="tenets">
      <div>No account required</div>
      <div>No cloud dependency</div>
      <div>No telemetry</div>
      <div>Secrets stay local</div>
    </div>
  </div>
</body>
</html>
